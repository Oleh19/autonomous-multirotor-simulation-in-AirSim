name: ci

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
      - name: Run stable test suite
        run: python -m pytest tests/test_settings_validation.py tests/test_command_safety.py tests/test_watchdog.py tests/test_freshness.py tests/test_logging.py tests/test_aruco_detector.py tests/test_depth_analyzer.py
